<div class="p-6">
  <app-back-link path="/clients" label="Volver a clientes" />

  <h1 class="mt-2 text-2xl font-bold text-gray-900 dark:text-white">{{ isEdit ? 'Editar' : 'Nuevo' }} cliente</h1>

  <form [formGroup]="form" (ngSubmit)="save()" class="mt-6 max-w-lg space-y-4">
    <app-input formControlName="name" label="Nombre *" />
    <app-input formControlName="email" label="Email" type="email" />
    <app-input formControlName="phone" label="Teléfono" />
    <app-input formControlName="address" label="Dirección" />
    <app-input formControlName="vatNumber" label="CIF / NIF" />

    <app-input formControlName="notes" label="Notas" variant="textarea" />

    <app-button type="submit" [disabled]="form.invalid || saveMutation.isPending()">
      {{ saveMutation.isPending() ? 'Guardando…' : 'Guardar' }}
    </app-button>
  </form>
</div>

<div class="p-6">
  <a routerLink="/clients" class="text-sm text-blue-600 hover:underline">← Volver a clientes</a>

  <h1 class="mt-2 text-2xl font-bold text-gray-900">{{ isEdit ? 'Editar' : 'Nuevo' }} cliente</h1>

  <form [formGroup]="form" (ngSubmit)="save()" class="mt-6 max-w-lg space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700">Nombre *</label>
      <input formControlName="name" class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Email</label>
      <input type="email" formControlName="email" class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Teléfono</label>
      <input formControlName="phone" class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Dirección</label>
      <input formControlName="address" class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">CIF / NIF</label>
      <input formControlName="vatNumber" class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Notas</label>
      <textarea formControlName="notes" rows="3" class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"></textarea>
    </div>

    <button type="submit" [disabled]="form.invalid || saveMutation.isPending()"
      class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 disabled:opacity-50">
      {{ saveMutation.isPending() ? 'Guardando…' : 'Guardar' }}
    </button>
  </form>
</div>

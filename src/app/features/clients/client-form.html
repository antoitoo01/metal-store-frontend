<div class="p-6">
  <app-back-link path="/clients" label="Volver a clientes" />

  <h1 class="mt-2 text-2xl font-bold text-gray-900 dark:text-white">{{ isEdit ? 'Editar' : 'Nuevo' }} cliente</h1>

  <form (submit)="save($event)" class="mt-6 max-w-lg space-y-4">
    <app-input
      id="name"
      [formField]="form.name"
      label="Nombre *"
      placeholder="Nombre del cliente"
      [error]="nameError()"
    />

    <app-input
      type="email"
      [formField]="form.email"
      label="Email"
      placeholder="email@ejemplo.com"
      [error]="emailError()"
    />

    <app-input
      [formField]="form.phone"
      label="Teléfono"
      placeholder="+34 600 000 000"
    />

    <app-input
      [formField]="form.address"
      label="Dirección"
      placeholder="Calle, ciudad, etc."
    />

    <app-input
      [formField]="form.vatNumber"
      label="CIF / NIF"
      placeholder="B-12345678"
    />

    <app-input
      variant="textarea"
      [formField]="form.notes"
      label="Notas"
      placeholder="Notas adicionales…"
    />

    <app-button type="submit" [disabled]="form().invalid() || saveMutation.isPending()">
      {{ saveMutation.isPending() ? 'Guardando…' : 'Guardar' }}
    </app-button>
  </form>
</div>

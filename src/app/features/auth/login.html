<div class="flex min-h-screen items-center justify-center bg-gray-50 dark:bg-gray-950">
  <form [formGroup]="form" (ngSubmit)="login()" class="w-full max-w-sm space-y-5 rounded-xl bg-white p-8 shadow-lg dark:bg-gray-900 dark:ring-1 dark:ring-gray-800">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Metal Store</h1>
      <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Inicia sesión para continuar</p>
    </div>

    <app-input
      formControlName="email"
      label="Email"
      type="email"
      placeholder="tu@email.com"
      [error]="form.controls.email.touched && form.controls.email.invalid ? 'Email válido requerido' : ''"
    />

    <app-input
      formControlName="password"
      label="Contraseña"
      type="password"
      placeholder="••••••••"
      [error]="form.controls.password.touched && form.controls.password.invalid ? 'Mínimo 8 caracteres' : ''"
    />

    <app-button type="submit" [disabled]="form.invalid" variant="primary" size="lg" class="w-full">
      Ingresar
    </app-button>

    <p class="text-center text-sm text-gray-500 dark:text-gray-400">
       ¿No tienes cuenta?
       <a routerLink="/register" class="font-medium text-blue-600 hover:text-blue-500 dark:text-blue-400 dark:hover:text-blue-300">Regístrate</a>
    </p>
  </form>
</div>

<div class="flex min-h-screen items-center justify-center bg-gray-50 px-4 dark:bg-gray-950">
  <form [formGroup]="form" (ngSubmit)="login()" class="w-full max-w-sm gap-y-7 space-y-7 rounded-xl bg-white p-8 shadow-lg dark:bg-gray-900 dark:ring-1 dark:ring-gray-800">
    <div class="space-y-1">
      <h1 class="text-center text-2xl font-bold text-gray-900 dark:text-white">Metal Store</h1>
      <p class="text-center text-sm text-gray-500 dark:text-gray-400">Inicia sesión para continuar</p>
    </div>

    <app-input
      formControlName="email"
      label="Email"
      type="email"
      placeholder="tu@email.com"
      [error]="form.controls.email.touched && form.controls.email.invalid ? 'Email válido requerido' : ''"
    />

    <app-input
      formControlName="password"
      label="Contraseña"
      type="password"
      placeholder="••••••••"
      [error]="form.controls.password.touched && form.controls.password.invalid ? 'Mínimo 8 caracteres' : ''"
    />

    <label class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400">
      <input
        type="checkbox"
        [checked]="rememberMe()"
        (change)="rememberMe.set($any($event.target).checked)"
        class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-800 dark:focus:ring-blue-400"
      />
      Mantener sesión iniciada
    </label>

    <app-button type="submit" variant="primary" size="lg" [block]="true" [disabled]="form.invalid || loading()" [loading]="loading()">
      Ingresar
    </app-button>

    <p class="text-center text-sm text-gray-500 dark:text-gray-400">
       ¿No tienes cuenta?
       <a routerLink="/register" class="font-medium text-blue-600 hover:text-blue-500 dark:text-blue-400 dark:hover:text-blue-300">Regístrate</a>
    </p>
  </form>
</div>
